    *{box-sizing:border-box} body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(1200px 600px at 20% 0%, rgba(122,162,255,.18), transparent 60%),radial-gradient(900px 450px at 100% 10%, rgba(101,214,168,.10), transparent 55%),var(--bg);color:var(--text);line-height:1.55}

    .hero{padding:36px 24px;border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));box-shadow:var(--shadow);text-align:center}
    h1{margin:0;font-size:clamp(64px,10vw,112px);line-height:1;color:var(--accent2)}
    .subtitle{margin:8px 0 0;font-size:22px;color:var(--text)}
    .body{margin-top:18px;color:#dbe2f5;font-size:16px;max-width:640px;margin-left:auto;margin-right:auto}
    .actions{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-top:22px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;text-decoration:none;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--text);font-size:14px}
    .btn.primary{background:rgba(122,162,255,.14);border-color:rgba(122,162,255,.28)}
    footer{max-width:var(--max);margin:16px auto 0;padding:0 20px 24px;color:var(--muted);font-size:13px}
    @media (max-width:520px){.wrap{padding:14px}.hero{padding:26px 18px}.subtitle{font-size:18px}}
